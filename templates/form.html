{% extends "base.html" %}

{% block content %}

<h2>Novo Registro</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label>Turma</label>
        <input name="turma" class="form-control">
    </div>

    <div class="mb-3">
        <label>Mês</label>
        <input name="mes" class="form-control">
    </div>

    <div class="mb-3">
        <label>Turno</label>
        <input name="turno" class="form-control">
    </div>

    <div class="mb-3">
        <label>Observações</label>
        <textarea name="observacoes" class="form-control"></textarea>
    </div>

    <button class="btn btn-success">Salvar</button>

</form>

{% endblock %}
